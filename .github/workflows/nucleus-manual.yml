name: Triggui Nucleus v3 — Manual

on:
  workflow_dispatch:
    inputs:
      modo:
        description: '¿Qué quieres correr hoy?'
        required: true
        default: 'shadow_batch'
        type: choice
        options:
          - shadow_batch
          - production_batch
          - single_book
      single_titulo:
        description: '[SINGLE] Título del libro'
        required: false
        type: string
      single_autor:
        description: '[SINGLE] Autor del libro'
        required: false
        type: string
      lens:
        description: '🔍 Lente del día. Vacío = sin lente.'
        required: false
        type: string
      visual_intent:
        description: '🎨 Intención visual libre (no se usa en v3, el modelo elige numéricamente)'
        required: false
        type: string
      book_context:
        description: '📖 Contexto específico del libro (Tier 1, tu curaduría gana)'
        required: false
        type: string
      seed:
        description: '🎲 Seed opcional para batch'
        required: false
        type: string
      crono_enabled:
        description: '🕒 Activar cronobiología automática'
        required: true
        default: true
        type: boolean

concurrency:
  group: triggui-nucleus-v3-manual
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TZ: America/Mexico_City
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      TRIGGUI_LENS: ${{ inputs.lens }}
      TRIGGUI_VISUAL_INTENT: ${{ inputs.visual_intent }}
      TRIGGUI_BOOK_CONTEXT: ${{ inputs.book_context }}
      TRIGGUI_SEED: ${{ inputs.seed }}
      TRIGGUI_CRONO_ENABLED: ${{ inputs.crono_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: experiments/nucleus
        run: npm ci || npm install --no-audit --no-fund

      - name: Linkear CSV
        working-directory: experiments/nucleus
        run: |
          mkdir -p data
          ln -sf "$GITHUB_WORKSPACE/data/libros_master.csv" data/libros_master.csv

      - name: Preparar libro SINGLE
        if: ${{ inputs.modo == 'single_book' }}
        working-directory: experiments/nucleus
        env:
          SINGLE_TITULO: ${{ inputs.single_titulo }}
          SINGLE_AUTOR: ${{ inputs.single_autor }}
        run: |
          python - <<'PY'
          import json, os
          payload = {
            "titulo": os.environ.get("SINGLE_TITULO", ""),
            "autor": os.environ.get("SINGLE_AUTOR", "")
          }
          open("/tmp/triggui-book.json", "w", encoding="utf-8").write(json.dumps(payload, ensure_ascii=False))
          PY

      - name: Ejecutar pipeline v3
        working-directory: experiments/nucleus
        env:
          SINGLE_MODE: ${{ inputs.modo == 'single_book' && 'true' || '' }}
          SHADOW_MODE: ${{ inputs.modo == 'shadow_batch' && 'true' || '' }}
        run: node build-contenido-nucleus.js

      - name: Mover outputs a raíz
        working-directory: experiments/nucleus
        run: |
          echo "📂 Estado en experiments/nucleus/ antes de mover:"
          ls -la contenido*.json 2>/dev/null || echo "(sin contenido*.json)"
          ls -la grounding-cache/ 2>/dev/null | head -5 || true
          ls -la quality-reports/ 2>/dev/null | head -5 || true

          if [ -f contenido.shadow.json ]; then
            mv -v contenido.shadow.json "$GITHUB_WORKSPACE/contenido.shadow.json"
          fi
          if [ -f contenido.json ] && [ "${{ inputs.modo }}" = "production_batch" ]; then
            mv -v contenido.json "$GITHUB_WORKSPACE/contenido.json"
          fi
          if [ -f contenido_edicion.json ]; then
            mv -v contenido_edicion.json "$GITHUB_WORKSPACE/contenido_edicion.json"
          fi

          for dir in inputs-history metrics quality-reports grounding-cache; do
            if [ -d "$dir" ]; then
              mkdir -p "$GITHUB_WORKSPACE/$dir"
              cp -rv "$dir"/* "$GITHUB_WORKSPACE/$dir/" 2>/dev/null || true
            fi
          done

          echo ""
          echo "📦 Estado final en \$GITHUB_WORKSPACE:"
          ls -la "$GITHUB_WORKSPACE"/contenido*.json 2>/dev/null || echo "(no contenido*.json)"
          ls -la "$GITHUB_WORKSPACE"/quality-reports/ 2>/dev/null | head -5 || true

      - name: Commit resultados
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          [ -f contenido.shadow.json ] && git add contenido.shadow.json || true
          [ -f contenido.json ] && git add contenido.json || true
          [ -f contenido_edicion.json ] && git add contenido_edicion.json || true
          [ -d inputs-history ] && git add inputs-history/ || true
          [ -d metrics ] && git add metrics/ || true
          [ -d quality-reports ] && git add quality-reports/ || true
          [ -d grounding-cache ] && git add grounding-cache/ || true

          if git diff --cached --quiet; then
            echo "🟡 Working tree clean — no hay cambios."
            exit 0
          fi

          echo "📝 Cambios staged:"
          git diff --cached --stat

          git commit -m "🌒 nucleus-v3 ${{ inputs.modo }}"

          BRANCH="${GITHUB_REF_NAME:-main}"
          for i in 1 2 3; do
            if git pull --rebase --autostash origin "$BRANCH" && git push origin "HEAD:$BRANCH"; then
              echo "✅ Push exitoso en intento $i"
              exit 0
            fi
            echo "⚠️  Intento $i falló, reintentando..."
            sleep 3
          done
          echo "❌ Falló el push después de 3 intentos"
          exit 1

      - name: Summary
        if: always()
        run: |
          echo "## Triggui Nucleus v3 — Manual" >> $GITHUB_STEP_SUMMARY
          echo "**Modo:** ${{ inputs.modo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lente:** ${{ inputs.lens && 'sí' || 'vacío' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Book context:** ${{ inputs.book_context && 'sí' || 'vacío' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Crono:** ${{ inputs.crono_enabled }}" >> $GITHUB_STEP_SUMMARY
          [ -f "$GITHUB_WORKSPACE/contenido_edicion.json" ] && echo "**contenido_edicion.json:** ✅ generado" >> $GITHUB_STEP_SUMMARY
          [ -f "$GITHUB_WORKSPACE/contenido.shadow.json" ] && echo "**contenido.shadow.json:** ✅ generado" >> $GITHUB_STEP_SUMMARY
          [ -f "$GITHUB_WORKSPACE/contenido.json" ] && echo "**contenido.json:** ✅ generado" >> $GITHUB_STEP_SUMMARY
          if [ -d "$GITHUB_WORKSPACE/quality-reports" ]; then
            echo "**Quality reports generados:** ✅" >> $GITHUB_STEP_SUMMARY
          fi
