name: Triggui Nucleus — Manual

on:
  workflow_dispatch:
    inputs:
      modo:
        description: '¿Qué quieres correr hoy?'
        required: true
        default: 'shadow_batch'
        type: choice
        options:
          - shadow_batch
          - production_batch
          - single_book
      single_titulo:
        description: '[SINGLE] Título del libro'
        required: false
        type: string
      single_autor:
        description: '[SINGLE] Autor del libro'
        required: false
        type: string
      lens:
        description: '🔍 Lente del día. Vacío = sin lente.'
        required: false
        type: string
      visual_intent:
        description: '🎨 Intención visual. Vacío = libro manda.'
        required: false
        type: string
      book_context:
        description: '📖 Contexto específico del libro (solo SINGLE)'
        required: false
        type: string
      seed:
        description: '🎲 Seed opcional'
        required: false
        type: string
      crono_enabled:
        description: '🕒 Activar cronobiología automática'
        required: true
        default: true
        type: boolean

concurrency:
  group: triggui-nucleus-manual
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: America/Mexico_City
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      TRIGGUI_LENS: ${{ inputs.lens }}
      TRIGGUI_VISUAL_INTENT: ${{ inputs.visual_intent }}
      TRIGGUI_BOOK_CONTEXT: ${{ inputs.book_context }}
      TRIGGUI_SEED: ${{ inputs.seed }}
      TRIGGUI_CRONO_ENABLED: ${{ inputs.crono_enabled }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: experiments/nucleus
        run: npm ci || npm install --no-audit --no-fund

      - name: Linkear CSV
        working-directory: experiments/nucleus
        run: |
          mkdir -p data
          ln -sf "$GITHUB_WORKSPACE/data/libros_master.csv" data/libros_master.csv

      - name: Preparar libro SINGLE
        if: ${{ inputs.modo == 'single_book' }}
        working-directory: experiments/nucleus
        run: |
          python - <<'PY'
          import json, os
          payload = {
            "titulo": os.environ.get("SINGLE_TITULO", ""),
            "autor": os.environ.get("SINGLE_AUTOR", "")
          }
          open("/tmp/triggui-book.json", "w", encoding="utf-8").write(json.dumps(payload, ensure_ascii=False))
          PY
        env:
          SINGLE_TITULO: ${{ inputs.single_titulo }}
          SINGLE_AUTOR: ${{ inputs.single_autor }}

      - name: Ejecutar pipeline
        working-directory: experiments/nucleus
        env:
          SINGLE_MODE: ${{ inputs.modo == 'single_book' && 'true' || '' }}
          SHADOW_MODE: ${{ inputs.modo == 'shadow_batch' && 'true' || '' }}
        run: node build-contenido-nucleus.js

      - name: Mover outputs a raíz
        working-directory: experiments/nucleus
        run: |
          [ -f contenido.shadow.json ] && mv contenido.shadow.json "$GITHUB_WORKSPACE/contenido.shadow.json" || true
          [ -f contenido.json ] && [ "${{ inputs.modo }}" = "production_batch" ] && mv contenido.json "$GITHUB_WORKSPACE/contenido.json" || true
          [ -f contenido_edicion.json ] && mv contenido_edicion.json "$GITHUB_WORKSPACE/contenido_edicion.json" || true
          [ -d inputs-history ] && mkdir -p "$GITHUB_WORKSPACE/inputs-history" && cp -r inputs-history/* "$GITHUB_WORKSPACE/inputs-history/" 2>/dev/null || true
          [ -d metrics ] && mkdir -p "$GITHUB_WORKSPACE/metrics" && cp -r metrics/* "$GITHUB_WORKSPACE/metrics/" 2>/dev/null || true

      - name: Commit resultados
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: |
            contenido.shadow.json
            contenido.json
            contenido_edicion.json
            inputs-history/*.md
            metrics/*.json
          commit_message: "🌒 nucleus ${{ inputs.modo }}"
          pull_options: '--rebase --autostash'

      - name: Summary
        run: |
          echo "## Triggui Nucleus Manual" >> $GITHUB_STEP_SUMMARY
          echo "**Modo:** ${{ inputs.modo }}" >> $GITHUB_STEP_SUMMARY
          echo "**Lente:** ${{ inputs.lens && 'sí' || 'vacío' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Visual intent:** ${{ inputs.visual_intent && 'sí' || 'vacío' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Crono:** ${{ inputs.crono_enabled }}" >> $GITHUB_STEP_SUMMARY
