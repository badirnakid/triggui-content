name: Triggui Nucleus — Automático diario (shadow)

# Corre diario a 06:30 AM CDMX en modo SHADOW. No toca producción.

on:
  schedule:
    - cron: '30 12 * * *'   # 06:30 CDMX = 12:30 UTC
  workflow_dispatch: {}

concurrency:
  group: triggui-nucleus-auto
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      TZ: America/Mexico_City
      OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
      SHADOW_MODE: "true"

    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install deps
        working-directory: experiments/nucleus
        run: npm install

      - name: Linkear CSV
        working-directory: experiments/nucleus
        run: |
          mkdir -p data
          ln -sf "$GITHUB_WORKSPACE/data/libros_master.csv" data/libros_master.csv

      - name: Ejecutar pipeline
        working-directory: experiments/nucleus
        run: node build-contenido-nucleus.js

      - name: Mover outputs a raíz
        working-directory: experiments/nucleus
        run: |
          if [ -f contenido.shadow.json ]; then
            mv -f contenido.shadow.json "$GITHUB_WORKSPACE/contenido.shadow.json"
            echo "✅ contenido.shadow.json movido"
          fi
          if [ -d inputs-history ] && [ "$(ls -A inputs-history)" ]; then
            mkdir -p "$GITHUB_WORKSPACE/inputs-history"
            cp -rf inputs-history/. "$GITHUB_WORKSPACE/inputs-history/"
          fi
          if [ -d metrics ] && [ "$(ls -A metrics)" ]; then
            mkdir -p "$GITHUB_WORKSPACE/metrics"
            cp -rf metrics/. "$GITHUB_WORKSPACE/metrics/"
          fi

      - name: Commit y push
        working-directory: ${{ github.workspace }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull origin main --rebase --autostash || true

          [ -f contenido.shadow.json ] && git add contenido.shadow.json
          [ -d inputs-history ] && git add inputs-history/ || true
          [ -d metrics ] && git add metrics/ || true

          if git diff --cached --quiet; then
            echo "No hay cambios"
            exit 0
          fi

          git commit -m "🌒 nucleus shadow diario — $(date -u +%Y-%m-%d)"

          for i in 1 2 3; do
            if git push origin HEAD:main; then
              break
            else
              git pull origin main --rebase --autostash
              [ "$i" = "3" ] && exit 1
            fi
          done
